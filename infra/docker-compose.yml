services:
  app:
    build: 
      context: ../app
      dockerfile: Dockerfile
    container_name: parkshare-app
    restart: always
    env_file:
      - .env
    networks:
      - parkshare-net
    volumes:
      - ../data:/data

  proxy:
    image: nginx:alpine
    container_name: parkshare-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - parkshare-net

networks:
  parkshare-net:
    driver: bridge

volumes:
  app-data: